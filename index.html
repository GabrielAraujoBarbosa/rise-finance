<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/style.css">
  <title>RiseFinance</title>
</head>

<body>
  <footer>
    <div class="logo footer-logo">
      <img src="./src/assets/images/logo.svg" alt="Logo da RiseFinance">
    </div>

    <section class="footer-links">
      <div class="footer-column">
        <h3>Menu Alternativo</h3>

        <ul>
          <li>
            <a href="">Inicio</a>
          </li>

          <li>
            <a href="">Sobre</a>
          </li>

          <li>
            <a href="">Diferencial</a>
          </li>

          <li>
            <a href="">Contato</a>
          </li>
        </ul>
      </div>

      <div class="footer-column">
        <h3>Ajuda</h3>

        <ul>
          <li>
            <a href="">Central de Ajuda</a>
          </li>

          <li>
            <a href="">FAQ</a>
          </li>

          <li>
            <a href="">Fórum</a>
          </li>
        </ul>
      </div>

      <div class="footer-column">
        <h3>Redes Sociais</h3>

        <ul>
          <li>
            <a href="">Facebook</a>
          </li>

          <li>
            <a href="">Instagram</a>
          </li>

          <li>
            <a href="">LinkedIn</a>
          </li>
        </ul>
      </div>
    </section>

    <section class="footer-newsletter">
      <form action="">
        <label for="email-input" class="bold">Inscreva-se para receber novidades.</label>

        <div class="input-group">
          <input type="email" name="user-email" id="email-input" placeholder="Digite seu e-mail" required>

          <button type="submit" aria-label="Enviar e-mail">
            <img src="./src/assets/images/button-icon.svg" alt=""> 
            <!-- ALT DESNECESSÁRIO, POIS TEM ARIA-LABEL NO BUTTON -->
          </button>
        </div>
      </form>
    </section>

  </footer>
</body>

</html>
